output:
  dir: output/information_agent
  json_file: latest_entities.json
  markdown_file: latest_entities.md

content:
  max_content_chars: 12000

search:
  provider: duckduckgo
  timeout_seconds: 5

fetch:
  max_workers: 6
  timeout_seconds: 30
  cache_dir: .cache/fetch_url
  cache_ttl_seconds: 86400
  retrieval_passage_limit: 5
  retrieval_neighbor_radius: 1

vertex_cache:
  dir: .cache/vertex_cache
  ttl_seconds: 3600

models:
  openai_default: gpt-4.1-mini
  vertex_default: gemini-2.5-flash
  intent: null
  lightning: null

modes:
  standard:
    search_result_limit: 8
    fetch_limit: 6
  deep:
    search_result_limit: 12
    fetch_limit: 3
  lightning:
    max_search_queries: 3
    search_result_limit: 5
    search_timeout_seconds: 3
    fetch_url_limit: 3

recursive_research:
  max_rounds: 2
  max_fetch_urls: 2
  standard_search_result_limit: 3
  deep_search_result_limit: 5
